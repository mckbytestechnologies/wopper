{% extends "base.html" %}

{% block content %}
<div class="container-fluid" style="background: #f4f7f6; min-height: 100vh; display: flex; align-items: center; padding: 40px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card" style="border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden;">
                    
                    <div class="card-header text-center" style="background: #ffffff; border-bottom: 1px solid #eee; padding: 30px 20px;">
                        <h3 style="font-weight: 700; color: #1e293b; margin-bottom: 5px;">Create Account</h3>
                    </div>

                    <div class="card-body" style="padding: 40px;">
                        {% if message %}
                        <div class="alert alert-danger" style="border-radius: 8px; border: none; background-color: #fef2f2; color: #b91c1c; font-size: 0.9rem;">
                            {{ message }}
                        </div>
                        {% endif %}
                        
                        <form method="post" id="signupForm">
                            {% csrf_token %}
                            
                            <div class="row">
                                <div class="col-md-6 form-group mb-4">
                                    <label>First Name</label>
                                    <input type="text" class="form-control" name="first_name" value="{{ form_data.first_name }}" required>
                                </div>
                                <div class="col-md-6 form-group mb-4">
                                    <label>Last Name</label>
                                    <input type="text" class="form-control" name="last_name" value="{{ form_data.last_name }}" required>
                                </div>
                            </div>

                            <div class="form-group mb-4">
                                <label>Email</label>
                                <input type="email" class="form-control" name="email" value="{{ form_data.email }}" required>
                            </div>
                            
                            <!-- PASSWORD FIELD -->
                            <div class="form-group mb-4">
                                <label>Password</label>

                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    name="password" 
                                    placeholder="Min 8 chars, A-Z & a-z"
                                    required
                                >

                                <!-- Error -->
                                <small id="passwordError" style="color:red; display:none;">
                                    Password must be 8+ characters with uppercase & lowercase letters
                                </small>
                            </div>

                            <button type="submit" class="btn btn-primary btn-block" style="width:100%;">
                                Create Free Account
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p>
                                Already have an account? 
                                <a href="{% url 'mck_auth:website_signin' %}">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ✅ SCRIPT -->
<script>
const passwordInput = document.getElementById("password");
const errorText = document.getElementById("passwordError");
const form = document.getElementById("signupForm");

const regex = /^(?=.*[a-z])(?=.*[A-Z]).{8,}$/;

// Live validation
passwordInput.addEventListener("input", function () {
    if (passwordInput.value.length > 0 && !regex.test(passwordInput.value)) {
        errorText.style.display = "block";
    } else {
        errorText.style.display = "none";
    }
});

// Prevent submit if invalid
form.addEventListener("submit", function (e) {
    if (!regex.test(passwordInput.value)) {
        e.preventDefault();
        errorText.style.display = "block";
        passwordInput.focus();
    }
});
</script>

{% endblock %}
