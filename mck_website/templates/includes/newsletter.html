{# templates/includes/newsletter.html #}
{# Used as the footer-top strip inside footer.html. Can also be included standalone. #}
<div class="footer-top">
    <div class="footer-top-text">
        <h4>Stay Updated With Wopper</h4>
        <p>Subscribe to receive exclusive offers, new product launches, cleaning tips, and industry solutions directly in your inbox.</p>
    </div>
    <form class="footer-newsletter-form"
          action=""
          method="POST"
          aria-label="Newsletter subscription form"
          novalidate>
        {% csrf_token %}
        <label for="newsletterEmail" class="sr-only">Email address</label>
        <input type="email"
               id="newsletterEmail"
               name="email"
               placeholder="Enter your email address"
               required
               autocomplete="email"
               aria-required="true">
        <button type="submit">Subscribe</button>
    </form>
</div>
