{% extends 'layouts/admin_layout.html' %}
{% block content %}

<style>
/* Reuse the same CSS from previous pages */

.form-container {
    max-width: 600px;
    margin: 0 auto;
}

.form-card {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-label {
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 0.5rem;
    display: block;
}

.form-control-modern {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #eef2f6;
    border-radius: 12px;
    transition: all 0.2s;
    font-size: 14px;
}

.form-control-modern:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.info-box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 16px;
    padding: 1.25rem;
    color: white;
    margin-bottom: 1.5rem;
}

.info-title {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 8px;
}

.info-value {
    font-size: 18px;
    font-weight: 600;
}

.btn-submit {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 12px 30px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    width: 100%;
    transition: transform 0.2s;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}
</style>

<div class="container-fluid px-4 py-4">
    <div class="form-container">
        <div class="form-card">
            <div class="text-center mb-4">
                <div style="font-size: 48px;">💰</div>
                <h3 class="mt-3">Record Cash Payment</h3>
                <p class="text-muted">Manually add a cash payment and activate user plan</p>
            </div>

            <div class="info-box">
                <div class="info-title">ℹ️ Information</div>
                <div class="info-value">Plan validity starts from today and lasts for the selected plan duration</div>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Select User *</label>
                    <select name="user_id" class="form-control-modern" required>
                        <option value="">-- Select User --</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.email }} - {{ user.get_full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Select Plan *</label>
                    <select name="plan" class="form-control-modern" required>
                        <option value="">-- Select Plan --</option>
                        {% for key, config in plans.items %}
                        <option value="{{ key }}">
                            {{ config.label }} - ₹{{ config.amount|floatformat:0 }} 
                            ({{ config.validity_months }} months, {{ config.profile_limit }} profiles)
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Payment Date</label>
                    <input type="date" name="payment_date" class="form-control-modern" value="{{ today|date:'Y-m-d' }}">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea name="notes" class="form-control-modern" rows="4" 
                              placeholder="Add any additional notes about this cash payment..."></textarea>
                </div>
                
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-submit">
                        ✓ Record Payment & Activate Plan
                    </button>
                    <a href="{% url 'svm_admin_console:custom_admin_payments' %}" class="btn btn-secondary" style="padding: 12px 30px; border-radius: 12px;">
                        View All Payments
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
